services:
  db:
    image: postgres:16
    container_name: tasfb2b-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tasfb2b_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tasfb2b-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: tasfb2b-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tasfb2b_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_jwt_secret_key_at_least_32_chars_long
      SIMULACION_SA: "120"
      SIMULACION_VENTANA_HORAS: "4"
      RUTA_ENVIOS: /data/envios/
      APP_REPORTES_RUTA_ARCHIVOS: /data/reportes
    volumes:
      - ./backend/backend/src/main/resources/data:/data/envios
      - ./backend/backend/src/main/resources/reportes:/data/reportes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasfb2b-frontend
    ports:
      - "5000:5000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/back/api
      PORT: "5000"
    depends_on:
      - backend

volumes:
  pgdata:
