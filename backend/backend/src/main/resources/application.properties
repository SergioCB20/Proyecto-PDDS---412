# ── Servidor ──────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${CONTEXT_PATH:}

# ── Base de datos ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ── Flyway ─────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true
# baseline-version=30: Salta V1-V30 en DB fresca porque JPA ddl-auto=update crea tablas y V31
# repara columnas faltantes con IF NOT EXISTS. Seed data (usuarios, roles, nodos, vuelos) no se
# inserta automaticamente en DB fresca — requiere DataSeeder o ejecutar V1-V30 manualmente.
spring.flyway.baseline-version=30

# ── Logging (Hibernate SQL via logback, no System.out) ─
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# ── Redis ─────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=1000
spring.data.redis.connect-timeout=1000

# ── HikariCP ──────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000

# ── JWT ───────────────────────────────────────────────
jwt.secret=${JWT_SECRET:insecure-dev-secret}
jwt.expiration=86400000

# ── Simulacion ─────────────────────────────────────────
app.simulacion.ruta-archivos=${RUTA_ENVIOS:src/main/resources/data/}
app.simulacion.k=${SIMULACION_K:120}
app.simulacion.sa-segundos=${SIMULACION_SA:30}

# JACKSON — ISO dates by default
