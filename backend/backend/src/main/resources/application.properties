# ── Servidor ──────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Base de datos ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ─────────────────────────────────────────────
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=30

# ── Logging (Hibernate SQL via logback, no System.out) ─
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# ── Redis ─────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── JWT ───────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Simulacion ─────────────────────────────────────────
app.simulacion.ruta-archivos=${RUTA_ENVIOS:src/main/resources/data/}
app.simulacion.k=${SIMULACION_K:120}
app.simulacion.sa-segundos=${SIMULACION_SA:30}

# JACKSON — ISO dates by default
