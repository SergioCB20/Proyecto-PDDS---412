name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_DIR: backend/backend
  FRONTEND_DIR: frontend

jobs:
  backend-ci:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tasfb2b_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tasfb2b_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SHOW_SQL: "false"
        run: mvn clean verify

  frontend-ci:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to Server PUCP
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd "${{ secrets.SERVER_DIR }}"
            git fetch origin main && git reset --hard origin/main

            # ── Backend ──────────────────────────
            cd backend/backend

            # 1. Detener Tomcat primero para liberar locks
            sudo systemctl stop tomcat11

            # 2. Limpiar build anterior (evita error de maven-clean-plugin)
            sudo rm -rf target/

            # 3. Compilar (sin clean, target/ ya fue eliminado)
            /opt/apache-maven-3.9.16/bin/mvn package -DskipTests

            # 4. Verificar integridad del WAR
            unzip -t target/*.war > /dev/null 2>&1
            echo "✅ WAR integrity verified"

            # 5. Asegurar que PostgreSQL esté listo
            sudo pg_isready -q 2>/dev/null || sudo systemctl start postgresql@16-main 2>/dev/null || echo "⚠️ PostgreSQL check skipped"

            # 6. Limpiar deploy anterior
            sudo rm -rf /opt/tomcat11/webapps/back /opt/tomcat11/webapps/back.war

            # 7. Copiar nuevo WAR como back.war (context-path /back)
            sudo cp target/*.war /opt/tomcat11/webapps/back.war

            # 8. Iniciar Tomcat
            sudo systemctl start tomcat11
            echo "✅ Backend WAR deployed. Tomcat started."

            # ── Frontend ─────────────────────────
            cd ../../frontend
            npm ci
            NEXT_PUBLIC_API_URL=/back/api npm run build
            sudo systemctl restart frontend
            sudo systemctl reload nginx
            echo "✅ Frontend restarted."

            # ── Health check progresivo ──────────
            echo "Waiting for backend to be ready..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/back/health > /dev/null 2>&1; then
                echo "✅ Backend healthy after ${i}0s"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "⚠️ Backend health check failed after 120s"
                exit 1
              fi
              sleep 10
            done

            curl -sfL http://localhost:5000/front/login | grep -q "TAS FB2B" && echo "✅ Frontend healthy" || echo "⚠️ Frontend health check failed"
