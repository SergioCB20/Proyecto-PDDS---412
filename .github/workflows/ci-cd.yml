name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_DIR: backend/backend
  FRONTEND_DIR: frontend

jobs:
  backend-ci:
    name: Backend - Build & Test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tasfb2b_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build and test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: tasfb2b_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: cf83e1357eefb8bdf1542850d66d8007d620e4050b5715dc83f4a921d36ce9ce
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SHOW_SQL: "false"
        run: mvn clean verify

  frontend-ci:
    name: Frontend - Build & Lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  deploy:
    name: Deploy to Server PUCP
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Probe TCP to SSH target
        run: |
          echo "Runner IP egress: $(curl -s https://api.ipify.org)"
          HOST=${{ secrets.SSH_HOST }}
          echo "Probing $HOST:22 ..."
          timeout 15 nc -vz "$HOST" 22 2>&1 || echo "EXIT_22=$?"
          echo "Probing $HOST:2222 ..."
          timeout 15 nc -vz "$HOST" 2222 2>&1 || echo "EXIT_2222=$?"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e

            echo "=== Espacio en disco ANTES de limpieza ==="
            df -h / | tail -1

            cd "${{ secrets.SERVER_DIR }}"
            git fetch origin main && git reset --hard origin/main

            # 0. Liberar espacio en disco para evitar out-of-disk
            echo "🧹 Limpiando cache de npm, logs del sistema, builds anteriores..."
            rm -rf ~/.npm/_cacache 2>/dev/null || true
            sudo apt clean -qq 2>/dev/null || true
            sudo journalctl --vacuum-time=3d --quiet 2>/dev/null || true
            sudo rm -f /var/log/syslog.* /var/log/btmp.* /var/log/auth.log.* /var/log/*.gz 2>/dev/null || true
            sudo rm -rf frontend/node_modules backend/backend/target 2>/dev/null || true
            # Limpiar WAR antiguo de despliegues previos (back/ era contexto /back/)
            sudo rm -rf /opt/tomcat11/webapps/back.war /opt/tomcat11/webapps/back/

            echo "=== Espacio en disco DESPUES de limpieza ==="
            df -h / | tail -1

            # ── Backend ──────────────────────────
            cd backend/backend

            # 1. Detener Tomcat primero para liberar locks
            sudo systemctl stop tomcat11

            # 2. Limpiar build anterior (evita error de maven-clean-plugin)
            sudo rm -rf target/

            # 3. Compilar con memoria reducida (la VM tiene solo 4GB RAM)
            export MAVEN_OPTS="-Xmx512m -XX:+UseSerialGC"
            /opt/apache-maven-3.9.16/bin/mvn package -DskipTests

            # 4. Verificar integridad del WAR
            unzip -t target/*.war > /dev/null 2>&1
            echo "✅ WAR integrity verified"

            # 5. Asegurar que PostgreSQL esté listo
            sudo pg_isready -q 2>/dev/null || sudo systemctl start postgresql@16-main 2>/dev/null || echo "⚠️ PostgreSQL check skipped"

            # 6. Limpiar deploy anterior
            sudo rm -rf /opt/tomcat11/webapps/ROOT /opt/tomcat11/webapps/ROOT.war

            # 7. Copiar nuevo WAR como ROOT.war (context-path /)
            sudo cp target/*.war /opt/tomcat11/webapps/ROOT.war

            # 8. Verificar que PostgreSQL esté listo
            sudo pg_isready -q 2>/dev/null || sudo systemctl start postgresql@16-main 2>/dev/null || echo "⚠️ PostgreSQL check skipped"

            # 9. Reparar checksums Flyway (evita mismatch si se modificó una migración ya aplicada)
            echo "🛠️ Reparando checksums de Flyway..."
            PGPASSWORD="${DB_PASSWORD:-postgres}" /usr/bin/psql -h localhost -U postgres \
              -d "${DB_NAME}" -c \
              "UPDATE flyway_schema_history SET checksum = -350889692 WHERE version = '35';" \
              2>&1 || echo "⚠️ flyway:repair falló, se intentará igual"

            # 10. Iniciar Tomcat
            sudo systemctl start tomcat11
            echo "✅ Backend WAR deployed. Tomcat started."

            # ── Liberar espacio para build frontend ──
            echo "🧹 Liberando espacio para build frontend..."
            rm -rf ~/.npm 2>/dev/null || true
            cd ../.. && sudo rm -rf backend/backend/target 2>/dev/null || true
            sudo journalctl --vacuum-size=100M --quiet 2>/dev/null || true

            # ── Frontend ─────────────────────────
            cd frontend
            npm ci
            NEXT_PUBLIC_API_URL=/back/api npm run build
            sudo systemctl restart frontend
            sudo systemctl reload nginx
            echo "✅ Frontend restarted."

            # ── Health check progresivo ──────────
            # ── Pre-diagnóstico antes del health check ──
            sleep 15
            echo "=== Estado de Tomcat ==="
            sudo systemctl status tomcat11 --no-pager 2>&1 || echo "(systemctl status falló)"
            echo "=== Puertos en escucha (8080) ==="
            sudo ss -tlnp 2>&1 | grep 8080 || echo "(no hay nada en 8080)"
            echo "=== Últimas líneas de journalctl ==="
            sudo journalctl -u tomcat11 --no-pager -n 100 --no-hostname 2>&1 | tail -60 || echo "(journalctl falló)"
            echo "=== Fin pre-diagnóstico ==="

            echo "Waiting for backend to be ready..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ Backend healthy after ${i}0s"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "⚠️ Backend health check failed after 600s"
                echo "=== Diagnóstico ==="
                echo "--- systemctl status ---"
                sudo systemctl status tomcat11 --no-pager 2>&1 || true
                echo "--- journalctl (últimas 100 líneas) ---"
                sudo journalctl -u tomcat11 --no-pager -n 100 --no-hostname 2>&1 || true
                echo "--- catalina.out (últimas 60 líneas) ---"
                sudo cat /opt/tomcat11/logs/catalina.out 2>&1 | tail -60 || true
                echo "--- catalina.YYYY-MM-DD.log (últimas 60) ---"
                sudo cat /opt/tomcat11/logs/catalina.$(date +%Y-%m-%d).log 2>&1 | tail -60 || true
                echo "--- localhost.YYYY-MM-DD.log (últimas 60) ---"
                sudo cat /opt/tomcat11/logs/localhost.$(date +%Y-%m-%d).log 2>&1 | tail -60 || true
                echo "=== Fin diagnóstico ==="
                exit 1
              fi
              sleep 10
            done

            echo "Waiting for frontend to be ready..."
            for i in $(seq 1 6); do
              if curl -sfL http://localhost:5000/front/login | grep -q "TAS FB2B"; then
                echo "✅ Frontend healthy after ${i}0s"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "⚠️ Frontend health check failed after 60s"
                sudo journalctl -u frontend --no-pager -n 30 2>/dev/null || echo "(no se pudo leer el log de frontend)"
              fi
              sleep 10
            done
